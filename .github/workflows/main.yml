name: Commit language donut

on:
  workflow_dispatch:
    inputs:
      author:
        description: GitHub username to analyze
        required: false
        default: "neuralorchid"
      max_commits:
        description: Maximum commits to inspect
        required: false
        default: "200"

permissions:
  contents: read

jobs:
  build-chart:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate SVG
        run: python generate_language_chart.py --output language-donut.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTHOR: ${{ inputs.author || github.actor }}
          MAX_COMMITS: ${{ inputs.max_commits }}

      - name: Upload SVG artifact
        uses: actions/upload-artifact@v4
        with:
          name: language-donut
          path: language-donut.svg
